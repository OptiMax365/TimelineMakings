<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Timeline Project</title>

<style>
:root{
  --bg-dark:#05120a;
  --green-mid:#164b29;
  --green-light:#2d9353;
  --green-glow:#4ade80;
  --white:#ffffff;
  --glass:rgba(255,255,255,0.08);
  --card-bg:rgba(12,32,20,0.92);
  --text-main:#e6f5eb;
  --text-muted:#8fbf9e;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
  font-family:Inter,system-ui,sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg-dark);
  color:var(--text-main);
}

body{
  touch-action:pan-y;
}

/* BACKGROUND */

#bg-layer{
  position:fixed;
  inset:-15%;
  width:130%;
  height:130%;
  background:
  radial-gradient(circle at 45% 45%,#185f36,var(--bg-dark) 75%);
  background-size:200% 200%;
  animation:bgMove 20s ease infinite;
  z-index:-1;
  cursor:grab;
  transition:transform .15s linear;
}

#bg-layer:active{
  cursor:grabbing;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* APP */

#app{
  width:100%;
  max-width:820px;
  height:100vh;
  margin:auto;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* HEADER */

header{
  flex-shrink:0;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:rgba(3,8,5,.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.08);
  z-index:20;
}

#datetime{
  font-size:.76rem;
  color:var(--green-glow);
  font-weight:700;
  text-shadow:0 0 10px rgba(74,222,128,.55);
}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.header-btn{
  border:none;
  outline:none;
  background:rgba(255,255,255,.07);
  color:#fff;
  border:1px solid rgba(74,222,128,.18);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:.78rem;
  font-weight:600;
  transition:.2s;
  min-height:36px;
}

.header-btn:hover{
  background:var(--green-mid);
}

/* VIEWPORT */

#viewport{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:12px 12px 120px;
  display:flex;
  flex-direction:column;
  gap:14px;
  scroll-behavior:smooth;
  position:relative;
}

#viewport::-webkit-scrollbar{
  width:5px;
}

#viewport::-webkit-scrollbar-thumb{
  background:var(--green-light);
  border-radius:50px;
}

/* TIMELINE */

.timeline-card{
  width:100%;
  min-height:220px;
  background:
  linear-gradient(
    165deg,
    rgba(18,54,31,.92),
    rgba(8,18,12,.98)
  );
  border:1px solid rgba(74,222,128,.18);
  border-radius:18px;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  transition:
  transform .18s ease,
  border-color .18s ease,
  width .1s linear;
  animation:cardEnter .25s ease;
  transform-origin:center center;
}

@keyframes cardEnter{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.timeline-card:hover{
  border-color:rgba(74,222,128,.4);
}

.card-sticky{
  position:sticky;
  top:0;
  z-index:8;
}

.card-top{
  padding:10px 12px 0 12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.card-date{
  font-size:.68rem;
  color:var(--green-glow);
  font-weight:700;
  text-shadow:0 0 8px rgba(74,222,128,.5);
}

.card-type{
  font-size:.65rem;
  color:#b5d9c1;
  background:rgba(255,255,255,.06);
  padding:5px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
}

.card-title{
  padding:8px 12px 0;
  font-size:.98rem;
  font-weight:700;
  color:#fff;
  line-height:1.3;
  word-break:break-word;
}

.card-content{
  margin:10px 12px 12px;
  height:clamp(140px,38vh,300px);
  border-radius:14px;
  overflow:hidden;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card-content-inner{
  width:100%;
  height:100%;
  overflow:hidden;
  position:relative;
}

/* TEXT PREVIEW */

.text-preview{
  width:100%;
  height:100%;
  padding:14px;
  overflow:hidden;
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.5;
  color:#d7f2e1;
  font-size:.84rem;
  position:relative;
}

.text-preview::after{
  content:"Preview";
  position:absolute;
  right:10px;
  bottom:10px;
  font-size:.64rem;
  color:#8fbf9e;
  background:rgba(0,0,0,.4);
  padding:4px 8px;
  border-radius:999px;
}

/* MEDIA */

.media-preview{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.media-preview img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.media-preview video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

.media-preview audio{
  width:92%;
}

/* CARD ACTIONS */

.card-actions{
  display:flex;
  gap:6px;
  padding:0 12px 12px;
}

.c-btn{
  flex:1;
  border:none;
  outline:none;
  background:rgba(255,255,255,.05);
  color:#fff;
  border:1px solid rgba(74,222,128,.16);
  padding:8px 8px;
  border-radius:10px;
  cursor:pointer;
  font-size:.74rem;
  font-weight:600;
  transition:.18s;
  min-height:34px;
}

.c-btn:hover{
  background:var(--green-mid);
}

.c-btn:disabled{
  opacity:.3;
  cursor:not-allowed;
}

/* ZOOM BAR */

.zoom-wrap{
  width:100%;
  padding:0 12px 12px;
}

.zoom-bar{
  width:100%;
  height:14px;
  background:rgba(255,255,255,.06);
  border-radius:999px;
  position:relative;
  touch-action:none;
}

.zoom-fill{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green-mid),var(--green-glow));
}

.zoom-knob{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#fff;
  position:absolute;
  top:50%;
  left:0%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 15px rgba(255,255,255,.5);
  cursor:grab;
}

.zoom-label{
  font-size:.66rem;
  color:#9ecdad;
  margin-top:6px;
  text-align:center;
}

/* ADD BUTTON */

#add-btn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  outline:none;
  background:#fff;
  color:#041008;
  font-size:2rem;
  font-weight:800;
  cursor:pointer;
  z-index:30;
  box-shadow:0 8px 35px rgba(74,222,128,.45);
  transition:.2s;
}

#add-btn:hover{
  transform:scale(1.06);
}

/* OVERLAY */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.modal{
  width:100%;
  max-width:760px;
  max-height:92vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:rgba(8,18,12,.98);
  border-radius:20px;
  border:1px solid rgba(74,222,128,.2);
  box-shadow:0 30px 60px rgba(0,0,0,.6);
}

.modal-header{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.modal-title{
  font-size:1rem;
  font-weight:700;
  color:#fff;
}

.close-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,.06);
  color:#fff;
  cursor:pointer;
  font-size:1.1rem;
}

.modal-body{
  overflow:auto;
  padding:16px;
}

/* SEARCH */

#searchBox{
  width:100%;
  height:48px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 14px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-size:.92rem;
  border:1px solid rgba(255,255,255,.08);
  margin-bottom:16px;
}

#searchBox::placeholder{
  color:#7fa98c;
}

/* CATEGORY GRID */

.cat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:10px;
}

.cat-item{
  min-height:92px;
  background:rgba(255,255,255,.04);
  border-radius:16px;
  border:1px solid rgba(255,255,255,.07);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  transition:.18s;
  padding:8px;
}

.cat-item:hover{
  transform:translateY(-2px);
  background:rgba(45,147,83,.18);
}

.cat-icon{
  font-size:1.55rem;
  margin-bottom:6px;
}

.cat-name{
  font-size:.72rem;
  font-weight:700;
  color:#fff;
}

.cat-ext{
  font-size:.62rem;
  color:#9dc7aa;
  margin-top:5px;
  line-height:1.4;
}

/* INPUT */

#timelineName{
  width:100%;
  height:50px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:0 14px;
  font-size:.95rem;
  margin-top:12px;
}

.main-btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:14px;
  background:var(--green-light);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  margin-top:14px;
  font-size:.92rem;
}

/* FULL VIEW */

#viewer{
  position:fixed;
  inset:0;
  background:#040805;
  z-index:200;
  display:none;
  flex-direction:column;
}

#viewer.active{
  display:flex;
}

.viewer-top{
  height:64px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:rgba(4,8,5,.95);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.viewer-title{
  font-size:.95rem;
  font-weight:700;
  color:#fff;
}

.viewer-actions{
  display:flex;
  gap:8px;
}

.viewer-btn{
  border:none;
  background:rgba(255,255,255,.06);
  color:#fff;
  height:40px;
  padding:0 14px;
  border-radius:10px;
  cursor:pointer;
}

#viewerContent{
  flex:1;
  overflow:auto;
  padding:18px;
}

#viewerContent pre{
  white-space:pre-wrap;
  word-break:break-word;
  color:#d5f1df;
  line-height:1.65;
  font-size:1rem;
}

#viewerContent textarea{
  width:100%;
  min-height:100%;
  border:none;
  outline:none;
  resize:none;
  background:transparent;
  color:#d5f1df;
  font-size:1rem;
  line-height:1.65;
}

#viewerContent img,
#viewerContent video{
  width:100%;
  height:100%;
  object-fit:contain;
}

#viewerContent audio{
  width:100%;
  margin-top:30px;
}

/* GRID VIEW */

#gridView{
  position:fixed;
  inset:0;
  z-index:220;
  background:#050b07;
  display:none;
  flex-direction:column;
}

#gridView.active{
  display:flex;
}

.grid-header{
  height:64px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.grid-body{
  flex:1;
  overflow:auto;
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.grid-item{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.grid-item-preview{
  height:130px;
  overflow:hidden;
  background:#09110c;
  display:flex;
  align-items:center;
  justify-content:center;
}

.grid-item-preview img,
.grid-item-preview video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.grid-item-info{
  padding:10px;
}

.grid-item-title{
  font-size:.74rem;
  font-weight:700;
  color:#fff;
  word-break:break-word;
}

.grid-item-type{
  font-size:.62rem;
  color:#8eb99b;
  margin-top:5px;
}

/* SLIDESHOW */

#slideshow{
  position:fixed;
  inset:0;
  background:#020503;
  z-index:240;
  display:none;
  flex-direction:column;
}

#slideshow.active{
  display:flex;
}

.slide-top{
  height:64px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.slide-center{
  flex:1;
  overflow:hidden;
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide-card{
  width:100%;
  max-width:1000px;
  height:100%;
  background:rgba(10,18,12,.98);
  border:1px solid rgba(74,222,128,.14);
  border-radius:22px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.slide-card-top{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.slide-body{
  flex:1;
  overflow:auto;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide-body img,
.slide-body video{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.slide-body audio{
  width:100%;
}

.slide-body pre{
  width:100%;
  white-space:pre-wrap;
  word-break:break-word;
  color:#d8f1df;
  line-height:1.7;
}

.slide-bottom{
  height:72px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border-top:1px solid rgba(255,255,255,.06);
}

.slide-btn{
  height:42px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  color:#fff;
  padding:0 16px;
  cursor:pointer;
  font-weight:700;
}

.slide-btn:hover{
  background:var(--green-mid);
}

#slideCounter{
  min-width:70px;
  text-align:center;
  color:#98c7a7;
  font-size:.82rem;
  font-weight:700;
}

/* MOBILE */

@media(max-width:700px){

  .timeline-card{
    min-height:200px;
  }

  .card-content{
    height:220px;
  }

  .cat-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .header-btn{
    padding:8px 10px;
    font-size:.72rem;
  }

  #add-btn{
    width:56px;
    height:56px;
    font-size:1.9rem;
  }

}

</style>
</head>

<body>

<div id="bg-layer"></div>

<div id="app">

<header>
  <div id="datetime">--</div>

  <div class="header-actions">
    <button class="header-btn" id="projectBtn">📁 Project</button>
    <button class="header-btn" id="gridBtn">▦ Grid</button>
    <button class="header-btn" id="slideBtn">▶ Slide</button>
  </div>
</header>

<div id="viewport"></div>

<button id="add-btn">+</button>

</div>

<!-- CATEGORY MODAL -->

<div class="overlay" id="catOverlay">

<div class="modal">

<div class="modal-header">
  <div class="modal-title">Add Timeline File</div>
  <button class="close-btn" onclick="closeAll()">✕</button>
</div>

<div class="modal-body">

<input id="searchBox" placeholder="Search .txt png mp4 js audio image video..." autocomplete="off">

<div class="cat-grid" id="catGrid"></div>

</div>

</div>

</div>

<!-- NAME MODAL -->

<div class="overlay" id="nameOverlay">

<div class="modal" style="max-width:520px;">

<div class="modal-header">
  <div class="modal-title">Timeline Item Name</div>
  <button class="close-btn" onclick="closeAll()">✕</button>
</div>

<div class="modal-body">

<input id="timelineName" placeholder="Enter timeline name..." autocomplete="off">

<button class="main-btn" id="continueBtn">Continue</button>

</div>

</div>

</div>

<input type="file" id="fileInput" multiple style="display:none;">

<!-- VIEWER -->

<div id="viewer">

<div class="viewer-top">

<div class="viewer-title" id="viewerTitle">Preview</div>

<div class="viewer-actions">
  <button class="viewer-btn" id="editBtn">Edit</button>
  <button class="viewer-btn" id="saveBtn" style="display:none;">Save</button>
  <button class="viewer-btn" onclick="closeViewer()">Close</button>
</div>

</div>

<div id="viewerContent"></div>

</div>

<!-- GRID VIEW -->

<div id="gridView">

<div class="grid-header">
  <div class="viewer-title">Timeline Grid</div>
  <button class="viewer-btn" onclick="closeGrid()">Close</button>
</div>

<div class="grid-body" id="gridBody"></div>

</div>

<!-- SLIDESHOW -->

<div id="slideshow">

<div class="slide-top">

<div class="viewer-title">Timeline Slideshow</div>

<button class="viewer-btn" onclick="closeSlide()">Close</button>

</div>

<div class="slide-center">

<div class="slide-card">

<div class="slide-card-top" id="slideMeta"></div>

<div class="slide-body" id="slideBody"></div>

</div>

</div>

<div class="slide-bottom">

<button class="slide-btn" onclick="slideMove(-1)">← Back</button>

<div id="slideCounter">1 / 1</div>

<button class="slide-btn" onclick="slideMove(1)">Next →</button>

</div>

</div>

<script>

/* =========================
CONFIG
========================= */

const CATS = [
{n:'Documents',i:'📄',e:['.txt','.docx','.pdf','.md','.csv']},
{n:'Spreadsheets',i:'📊',e:['.xlsx','.xls','.csv']},
{n:'Presentations',i:'🎞️',e:['.pptx','.ppt']},

{n:'Database',i:'🗃️',e:['.sql','.db','.sqlite']},

{n:'Fonts',i:'🔤',e:['.ttf','.otf','.woff','.woff2']},
{n:'Science',i:'📐',e:['.dwg','.dxf','.stl','.obj']},
{n:'AI',i:'🤖',e:['.onnx','.pth','.h5','.safetensors']},
{n:'Games',i:'🎮',e:['.unity','.pak','.sav']},
{n:'Security',i:'🔐',e:['.pem','.crt','.key']},
{n:'Robotics',i:'🦾',e:['.urdf','.sdf','.rosbag']},
{n:'Virtualization',i:'💽',e:['.vmdk','.ova','.vdi']},
{n:'Disc',i:'💿',e:['.iso','.img','.bin']},
{n:'Email',i:'📧',e:['.eml','.pst','.msg']},
{n:'GIS',i:'🗺️',e:['.geojson','.kml','.shp']},
{n:'Blockchain',i:'🔗',e:['.wallet','.keystore']},
{n:'Special',i:'✨',e:['.torrent','.ics','.vcf']}
];

const TEXT_TYPES = [
'txt','md','csv','json','html','css','js','php','py','java','cpp','c','ts','sql',
'yaml','yml','ini','env','xml','log','conf'
];

/* =========================
STATE
========================= */

let timeline = [];
let selectedCat = null;
let pendingName = '';
let currentPreview = null;
let currentSlide = 0;
let editMode = false;

/* =========================
ELEMENTS
========================= */

const viewport = document.getElementById('viewport');
const fileInput = document.getElementById('fileInput');

/* =========================
INIT
========================= */

window.addEventListener('load',()=>{

  renderCategories();

  loadData();

  updateClock();

  setInterval(updateClock,1000);

  initEvents();

  initBackgroundDrag();

});

/* =========================
CLOCK
========================= */

function updateClock(){
  document.getElementById('datetime').textContent =
  new Date().toLocaleString();
}

/* =========================
BACKGROUND DRAG
========================= */

function initBackgroundDrag(){

  const bg = document.getElementById('bg-layer');

  let active = false;
  let startX = 0;
  let startY = 0;
  let x = 0;
  let y = 0;

  function start(e){
    active = true;
    startX = getX(e);
    startY = getY(e);
  }

  function move(e){

    if(!active)return;

    const nx = getX(e);
    const ny = getY(e);

    x += (nx - startX);
    y += (ny - startY);

    startX = nx;
    startY = ny;

    bg.style.transform =
    `translate(${x * .08}px,${y * .08}px)`;

  }

  function end(){
    active = false;

    bg.style.transition = 'transform .5s ease';

    bg.style.transform = 'translate(0px,0px)';

    setTimeout(()=>{
      x = 0;
      y = 0;
      bg.style.transition = '';
    },500);
  }

  bg.addEventListener('mousedown',start);
  bg.addEventListener('touchstart',start,{passive:true});

  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:true});

  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);

}

/* =========================
UTIL
========================= */

function getX(e){
  return e.touches ? e.touches[0].clientX : e.clientX;
}

function getY(e){
  return e.touches ? e.touches[0].clientY : e.clientY;
}

function saveData(){
  localStorage.setItem(
    'timeline_project_data',
    JSON.stringify(timeline)
  );
}

function loadData(){

  const data =
  localStorage.getItem('timeline_project_data');

  if(!data)return;

  try{
    timeline = JSON.parse(data);
    timeline.forEach(renderCard);
  }catch(e){
    timeline = [];
  }

}

function escapeHtml(text=''){
  return text
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;');
}

function closeAll(){
  document.querySelectorAll('.overlay')
  .forEach(el=>el.classList.remove('active'));
}

function closeViewer(){
  document.getElementById('viewer')
  .classList.remove('active');

  editMode = false;
}

function closeGrid(){
  document.getElementById('gridView')
  .classList.remove('active');
}

function closeSlide(){
  document.getElementById('slideshow')
  .classList.remove('active');
}

function fmtSize(bytes){

  if(bytes < 1024)return bytes + ' B';

  if(bytes < 1024*1024)
  return (bytes/1024).toFixed(1) + ' KB';

  return (bytes/1024/1024).toFixed(1) + ' MB';

}

/* =========================
RENDER CATEGORY
========================= */

function renderCategories(filter=''){

  const grid = document.getElementById('catGrid');

  grid.innerHTML = '';

  CATS
  .filter(cat=>{

    const full =
    cat.n.toLowerCase() + ' ' +
    cat.e.join(' ').toLowerCase();

    return full.includes(filter.toLowerCase());

  })
  .forEach(cat=>{

    const div = document.createElement('div');

    div.className = 'cat-item';

    div.innerHTML = `
      <div class="cat-icon">${cat.i}</div>
      <div class="cat-name">${cat.n}</div>
      <div class="cat-ext">${cat.e.join(' ')}</div>
    `;

    div.onclick = ()=>{

      selectedCat = cat;

      document.getElementById('catOverlay')
      .classList.remove('active');

      document.getElementById('nameOverlay')
      .classList.add('active');

      document.getElementById('timelineName').value='';

      setTimeout(()=>{
        document.getElementById('timelineName').focus();
      },100);

    };

    grid.appendChild(div);

  });

}

/* =========================
EVENTS
========================= */

function initEvents(){

  document.getElementById('add-btn')
  .onclick = ()=>{
    document.getElementById('catOverlay')
    .classList.add('active');
  };

  document.getElementById('searchBox')
  .addEventListener('input',e=>{
    renderCategories(e.target.value);
  });

  document.getElementById('continueBtn')
  .onclick = ()=>{

    const value =
    document.getElementById('timelineName')
    .value
    .trim();

    if(!value){
      alert('Enter timeline name');
      return;
    }

    pendingName = value;

    document.getElementById('nameOverlay')
    .classList.remove('active');

    fileInput.accept =
    selectedCat.e.join(',');

    fileInput.click();

  };

  fileInput.addEventListener('change',handleFiles);

  document.getElementById('slideBtn')
  .onclick = ()=>{

    if(!timeline.length)return;

    currentSlide = 0;

    document.getElementById('slideshow')
    .classList.add('active');

    renderSlide();

  };

  document.getElementById('gridBtn')
  .onclick = renderGrid;

}

/* =========================
FILES
========================= */

async function handleFiles(e){

  const files = [...e.target.files];

  if(!files.length){
    closeAll();
    return;
  }

  for(const file of files){

    await addSingleFile(file);

  }

  saveData();

  closeAll();

  fileInput.value = '';

  setTimeout(()=>{
    viewport.scrollTo({
      top:viewport.scrollHeight,
      behavior:'smooth'
    });
  },100);

}

function addSingleFile(file){

  return new Promise((resolve)=>{

    const ext =
    file.name.split('.').pop().toLowerCase();

    const isText =
    TEXT_TYPES.includes(ext);

    const reader = new FileReader();

    reader.onload = (ev)=>{

      const now = new Date();

      const item = {

        id:
        crypto.randomUUID ?
        crypto.randomUUID() :
        Date.now() + Math.random().toString(36),

        name:pendingName,

        category:selectedCat.n,

        icon:selectedCat.i,

        ext,

        size:file.size,

        date:now.toLocaleDateString(),

        time:now.toLocaleTimeString(),

        created:Date.now(),

        zoom:0,

        dataURL:
        isText ? null : ev.target.result,

        text:
        isText ? ev.target.result : null

      };

      timeline.push(item);

      renderCard(item);

      resolve();

    };

    if(isText){
      reader.readAsText(file);
    }else{
      reader.readAsDataURL(file);
    }

  });

}

/* =========================
RENDER CARD
========================= */

function renderCard(item){

  const card =
  document.createElement('div');

  card.className = 'timeline-card';

  card.dataset.id = item.id;

  const zoomWidth = getZoomWidth(item.zoom);

  card.style.width = zoomWidth;

  const content =
  renderCardContent(item);

  card.innerHTML = `

  <div class="card-top">
    <div class="card-date">
      ${item.date} • ${item.time}
    </div>

    <div class="card-type">
      ${item.icon}
      ${item.ext.toUpperCase()}
    </div>
  </div>

  <div class="card-title">
    ${escapeHtml(item.name)}
  </div>

  <div class="card-content">

    <div class="card-content-inner">

      ${content}

    </div>

  </div>

  <div class="card-actions">

    <button class="c-btn"
    onclick="openPreview('${item.id}')">
      👁 Preview
    </button>

    <button class="c-btn"
    onclick="openEdit('${item.id}')"
    ${item.text ? '' : 'disabled'}>
      ✏ Edit
    </button>

  </div>

  <div class="zoom-wrap">

    <div class="zoom-bar">

      <div class="zoom-fill"></div>

      <div class="zoom-knob"></div>

    </div>

    <div class="zoom-label">
      Drag Right = Bigger • Drag Left = Smaller
    </div>

  </div>

  `;

  viewport.appendChild(card);

  initZoom(card,item);

}

/* =========================
RENDER CONTENT
========================= */

function renderCardContent(item){

  if(item.text){

    return `
    <div class="text-preview">
      ${escapeHtml(
        item.text.substring(0,900)
      )}
    </div>
    `;

  }

  if(
    ['jpg','png','gif','webp','svg','psd']
    .includes(item.ext)
  ){

    return `
    <div class="media-preview">
      <img src="${item.dataURL}">
    </div>
    `;

  }

  if(
    ['mp4','mov','mkv','avi','webm']
    .includes(item.ext)
  ){

    return `
    <div class="media-preview">
      <video controls playsinline src="${item.dataURL}"></video>
    </div>
    `;

  }

  if(
    ['mp3','wav','flac','aac']
    .includes(item.ext)
  ){

    return `
    <div class="media-preview">
      <audio controls src="${item.dataURL}"></audio>
    </div>
    `;

  }

  return `
  <div class="media-preview"
  style="flex-direction:column;color:#fff;">
    <div style="font-size:3rem;">
      ${item.icon}
    </div>

    <div style="
    margin-top:10px;
    font-size:.8rem;
    text-align:center;
    padding:0 12px;
    ">
      ${item.ext.toUpperCase()}
    </div>
  </div>
  `;

}

/* =========================
ZOOM
========================= */

function initZoom(card,item){

  const bar = card.querySelector('.zoom-bar');
  const fill = card.querySelector('.zoom-fill');
  const knob = card.querySelector('.zoom-knob');

  updateZoomUI();

  let dragging = false;

  function update(clientX){

    const rect = bar.getBoundingClientRect();

    let percent =
    ((clientX - rect.left) / rect.width) * 100;

    percent = Math.max(0,Math.min(100,percent));

    item.zoom = percent;

    card.style.width = getZoomWidth(percent);

    updateZoomUI();

    saveData();

  }

  function updateZoomUI(){

    fill.style.width = item.zoom + '%';

    knob.style.left = item.zoom + '%';

  }

  function start(e){

    dragging = true;

    update(
      e.touches ?
      e.touches[0].clientX :
      e.clientX
    );

  }

  function move(e){

    if(!dragging)return;

    update(
      e.touches ?
      e.touches[0].clientX :
      e.clientX
    );

  }

  function end(){
    dragging = false;
  }

  bar.addEventListener('mousedown',start);
  bar.addEventListener('touchstart',start,{passive:true});

  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:true});

  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);

}

function getZoomWidth(percent){

  const min = 45;
  const max = 100;

  const result =
  min + ((max-min) * (percent/100));

  return result + '%';

}

/* =========================
PREVIEW
========================= */

function openPreview(id){

  const item =
  timeline.find(x=>x.id===id);

  if(!item)return;

  currentPreview = item;

  editMode = false;

  document.getElementById('viewer')
  .classList.add('active');

  document.getElementById('viewerTitle')
  .textContent = item.name;

  document.getElementById('saveBtn')
  .style.display = 'none';

  document.getElementById('editBtn')
  .style.display =
  item.text ? 'block' : 'none';

  renderViewer(item);

}

function renderViewer(item){

  const area =
  document.getElementById('viewerContent');

  if(editMode && item.text){

    area.innerHTML = `
    <textarea id="editArea">${escapeHtml(item.text)}</textarea>
    `;

    return;
  }

  if(item.text){

    area.innerHTML = `
    <pre>${escapeHtml(item.text)}</pre>
    `;

    return;
  }

  if(
    ['jpg','png','gif','webp','svg','psd']
    .includes(item.ext)
  ){

    area.innerHTML =
    `<img src="${item.dataURL}">`;

    return;
  }

  if(
    ['mp4','mov','mkv','avi','webm']
    .includes(item.ext)
  ){

    area.innerHTML =
    `<video controls autoplay playsinline src="${item.dataURL}"></video>`;

    return;
  }

  if(
    ['mp3','wav','flac','aac']
    .includes(item.ext)
  ){

    area.innerHTML =
    `<audio controls autoplay src="${item.dataURL}"></audio>`;

    return;
  }

  area.innerHTML = `
  <div style="
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:#fff;
  text-align:center;
  ">
    <div style="font-size:5rem;">
      ${item.icon}
    </div>

    <div style="margin-top:16px;font-size:1rem;">
      ${item.name}
    </div>

    <div style="margin-top:8px;color:#8db99a;">
      ${item.ext.toUpperCase()}
    </div>
  </div>
  `;

}

function openEdit(id){

  openPreview(id);

  if(!currentPreview.text)return;

  editMode = true;

  document.getElementById('saveBtn')
  .style.display = 'block';

  renderViewer(currentPreview);

}

document.getElementById('editBtn')
.onclick = ()=>{

  if(!currentPreview)return;

  editMode = true;

  document.getElementById('saveBtn')
  .style.display = 'block';

  renderViewer(currentPreview);

};

document.getElementById('saveBtn')
.onclick = ()=>{

  if(!currentPreview)return;

  const value =
  document.getElementById('editArea').value;

  currentPreview.text = value;

  saveData();

  const card =
  document.querySelector(
    `.timeline-card[data-id="${currentPreview.id}"]`
  );

  if(card){

    card.querySelector('.card-content-inner')
    .innerHTML =
    renderCardContent(currentPreview);

  }

  editMode = false;

  document.getElementById('saveBtn')
  .style.display = 'none';

  renderViewer(currentPreview);

};

/* =========================
GRID
========================= */

function renderGrid(){

  const body =
  document.getElementById('gridBody');

  body.innerHTML = '';

  timeline.forEach(item=>{

    const div =
    document.createElement('div');

    div.className = 'grid-item';

    div.innerHTML = `

    <div class="grid-item-preview">

      ${
        item.text ?

        `<div style="
        padding:12px;
        font-size:.72rem;
        overflow:hidden;
        line-height:1.4;
        color:#d6f1de;
        ">
        ${escapeHtml(item.text.substring(0,200))}
        </div>`

        :

        (
          ['jpg','png','gif','webp','svg']
          .includes(item.ext)

          ?

          `<img src="${item.dataURL}">`

          :

          (
            ['mp4','mov','mkv','avi','webm']
            .includes(item.ext)

            ?

            `<video src="${item.dataURL}"></video>`

            :

            `<div style="font-size:3rem;">
              ${item.icon}
            </div>`
          )
        )
      }

    </div>

    <div class="grid-item-info">

      <div class="grid-item-title">
        ${escapeHtml(item.name)}
      </div>

      <div class="grid-item-type">
        ${item.ext.toUpperCase()}
      </div>

    </div>

    `;

    div.onclick = ()=>{
      openPreview(item.id);
    };

    body.appendChild(div);

  });

  document.getElementById('gridView')
  .classList.add('active');

}

/* =========================
SLIDESHOW
========================= */

function renderSlide(){

  const item = timeline[currentSlide];

  document.getElementById('slideCounter')
  .textContent =
  `${currentSlide+1} / ${timeline.length}`;

  document.getElementById('slideMeta')
  .innerHTML = `

  <div style="
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  ">

    <div>
      <div style="
      color:#fff;
      font-weight:700;
      font-size:1rem;
      ">
        ${escapeHtml(item.name)}
      </div>

      <div style="
      margin-top:6px;
      color:#8eb89b;
      font-size:.8rem;
      ">
        ${item.date} • ${item.time}
      </div>
    </div>

    <div style="
    color:#9bd2aa;
    font-size:.82rem;
    ">
      ${item.icon}
      ${item.ext.toUpperCase()}
    </div>

  </div>

  `;

  const body =
  document.getElementById('slideBody');

  if(item.text){

    body.innerHTML =
    `<pre>${escapeHtml(item.text)}</pre>`;

    return;
  }

  if(
    ['jpg','png','gif','webp','svg','psd']
    .includes(item.ext)
  ){

    body.innerHTML =
    `<img src="${item.dataURL}">`;

    return;
  }

  if(
    ['mp4','mov','mkv','avi','webm']
    .includes(item.ext)
  ){

    body.innerHTML =
    `<video controls autoplay playsinline src="${item.dataURL}"></video>`;

    return;
  }

  if(
    ['mp3','wav','flac','aac']
    .includes(item.ext)
  ){

    body.innerHTML =
    `<audio controls autoplay src="${item.dataURL}"></audio>`;

    return;
  }

  body.innerHTML = `
  <div style="
  text-align:center;
  color:#fff;
  ">
    <div style="font-size:6rem;">
      ${item.icon}
    </div>

    <div style="
    margin-top:16px;
    font-size:1rem;
    ">
      ${item.name}
    </div>
  </div>
  `;

}

function slideMove(dir){

  currentSlide += dir;

  if(currentSlide < 0){
    currentSlide = timeline.length - 1;
  }

  if(currentSlide >= timeline.length){
    currentSlide = 0;
  }

  renderSlide();

}

/* =========================
KEYBOARD
========================= */

document.addEventListener('keydown',e=>{

  if(
    document.getElementById('slideshow')
    .classList.contains('active')
  ){

    if(e.key === 'ArrowRight'){
      slideMove(1);
    }

    if(e.key === 'ArrowLeft'){
      slideMove(-1);
    }

  }

  if(e.key === 'Escape'){

    closeAll();
    closeViewer();
    closeGrid();
    closeSlide();

  }

});

</script>
